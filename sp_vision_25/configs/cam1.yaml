# configs/cam1.yaml
enemy_color: "blue"

#####-----神经网络参数-----#####
yolo_name: "yolov5"
classify_model: assets/tiny_resnet.onnx
yolo11_model_path: assets/yolo11.xml
yolov8_model_path: assets/yolov8.xml
yolov5_model_path: assets/yolov5.xml
device: "CPU"
min_confidence: 0.8
use_traditional: false  # 必须加上

#####-----ROI 参数 (YOLO 初始化通常需要这些 int) -----#####
roi: 
  x: 420
  y: 50
  width: 600
  height: 600
use_roi: false

#####-----硬件参数 (相机 1 专属) -----#####
camera_name: "hikrobot"
serial_number: "00DA5751516"
exposure_ms: 2
gain: 10
image_width: 1440
image_height: 1080
vid_pid: "2bdf:0001"

#####-----传统方法参数-----#####  # ← 添加这一节！
threshold: 150
max_angle_error: 45
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25
# min_confidence: 0.8  # 已经有了

#####-----cboard参数-----#####  # ← 添加这一节！
quaternion_canid: 0x01
bullet_speed_canid: 0x110
send_canid: 0xff
can_interface: "can0"

#####-----tracker参数 (补全缺失值) -----#####
min_detect_count: 5
max_temp_lost_count: 25
outpost_max_temp_lost_count: 75  # 必须加上，防止报错

#####-----aimer参数 (改为整数格式) -----#####
yaw_offset: -0.8
pitch_offset: -1.0
comming_angle: 60      
leaving_angle: 20      
decision_speed: 10     
high_speed_delay_time: 0.026
low_speed_delay_time: 0.010
left_yaw_offset: -1
right_yaw_offset: -0.6

#####-----标定参数 (相机 1 专属) -----#####
camera_matrix: [1759.68866, 0, 733.10365, 0, 1744.21692, 545.62975, 0, 0, 1]
distort_coeffs: [-0.101461, 0.183015, -0.001380, 0.000832, 0]
R_camera2gimbal: [1, 0, 0, 0, 1, 0, 0, 0, 1]
t_camera2gimbal: [0.0, 0.0, 0.0]
R_gimbal2imubody: [1, 0, 0, 0, 1, 0, 0, 0, 1]

#####-----其他必要参数 (对标 sentry) -----#####
first_tolerance: 5
second_tolerance: 2
judge_distance: 3
auto_fire: false
mode: 1

# 保持高性能
fps: 90