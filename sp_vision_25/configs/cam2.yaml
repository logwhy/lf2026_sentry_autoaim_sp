# configs/cam2.yaml
enemy_color: "blue"

#####-----神经网络参数-----#####
yolo_name: "yolov5"
yolov5_model_path: "assets/yolov5.xml"
classify_model: assets/tiny_resnet.onnx
yolo11_model_path: assets/yolo11.xml
yolov8_model_path: assets/yolov8.xml
yolov5_model_path: assets/yolov5.xml
device: "CPU"
min_confidence: 0.8

# --- 硬件与基础参数 ---
camera_name: "hikrobot"
serial_number: "00DA5751514"
vid_pid: "2bdf:0001"
exposure_ms: 3
gain: 10
image_width: 1440
image_height: 1080

# --- 相机 2 专属标定参数 (已从 camera2 节点提取到根部) ---
camera_matrix: [1810.18913, 0.0, 729.08455, 0.0, 1811.24101, 546.01958, 0.0, 0.0, 1.0]
distort_coeffs: [-0.054302, -0.016375, 0.000738, -0.000240, 0.0]
R_camera2gimbal: [1, 0, 0, 0, 1, 0, 0, 0, 1]
t_camera2gimbal: [0.0, 0.0, 0.0]
R_gimbal2imubody: [1, 0, 0, 0, 1, 0, 0, 0, 1]

#####-----tracker参数 (补全缺失值) -----#####
min_detect_count: 5
max_temp_lost_count: 25
outpost_max_temp_lost_count: 75  # 必须加上，防止报错

#####-----aimer参数 (改为整数格式) -----#####
yaw_offset: -0.8
pitch_offset: -1.0
comming_angle: 60      # 改为整数
leaving_angle: 20      # 改为整数
decision_speed: 10     # 改为整数
high_speed_delay_time: 0.026
low_speed_delay_time: 0.010
left_yaw_offset: -1
right_yaw_offset: -0.6

#####-----其他必要参数 (对标 sentry) -----#####
first_tolerance: 5
second_tolerance: 2
judge_distance: 3
auto_fire: false
mode: 1
use_roi: false
use_traditional: false

#####-----ROI 参数-----#####
roi: 
  x: 420
  y: 50
  width: 600
  height: 600

#####-----传统方法参数-----#####
threshold: 150
max_angle_error: 45
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25

#####-----cboard参数-----#####
quaternion_canid: 0x01
bullet_speed_canid: 0x110
send_canid: 0xff
can_interface: "can0"

# 降低帧率减少开销
fps: 40